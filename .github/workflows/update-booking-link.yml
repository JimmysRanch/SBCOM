name: Update booking link

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-booking-link.yml

permissions:
  contents: write

jobs:
  update-booking-link:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace booking URL
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          old_url = "https://126-eta.vercel.app/book/b2f7dd90-b17b-4f7d-a655-3de67d1964d8"
          new_url = "https://app.zoomiegroomie.com/book/scruffy-butts"
          content = path.read_text()

          if content.count(old_url) != 1:
              raise SystemExit(f"Expected exactly one old booking URL, found {content.count(old_url)}")

          path.write_text(content.replace(old_url, new_url))
          PY

      - name: Commit the one-line change
        shell: bash
        run: |
          rm .github/workflows/update-booking-link.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-booking-link.yml
          git commit -m "Update Scruffy Butts booking link"
          git push origin HEAD:main
