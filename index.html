<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scruffy Butts</title>
    <style>
      :root {
        --vanilla: #fff;
        --pink: #e1accf;
        --purple: #8f4899;
        --midnight: #313131;
        --button-bg: rgba(255, 255, 255, 0.92);
        --button-text: #5f2d67;
      }

      * {
        box-sizing: border-box;
      }

      @keyframes left-scrolling-images {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-900%, 0, 0);
        }
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-weight: 400;
        font-size: 16px;
        font-style: normal;
        background: linear-gradient(180deg, #9d58aa 0%, #8f4899 55%, #73397d 100%);
        color: var(--vanilla);
      }

      img {
        display: block;
        max-width: 100%;
      }

      .page {
        min-height: 100vh;
      }

      .topbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        padding: 24px 32px;
        z-index: 3;
      }

      .brand {
        display: inline-flex;
        align-items: flex-start;
      }

      .brand img {
        width: min(300px, 28vw);
        min-width: 150px;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.2));
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 14px;
      }

      .nav a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 24px;
        border-radius: 999px;
        background: var(--button-bg);
        color: var(--button-text);
        text-decoration: none;
        font-size: 1rem;
        letter-spacing: 0.02em;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
      }

      .nav a:last-child {
        background: #f7c45b;
        color: var(--midnight);
      }

      .hero {
        min-height: 100vh;
        padding: 110px 24px 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-frame {
        width: min(1280px, 100%);
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 30px 60px rgba(24, 9, 27, 0.35);
      }

      .hero-frame img {
        width: 100%;
        height: auto;
      }

      .gallery-section {
        margin-top: 24px;
        padding: 0 0 72px;
      }

      .container-fluid {
        padding: 0;
      }

      .scroll-section {
        position: relative;
        overflow: hidden;
        padding: 64px 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      }

      .scrolling-images-wrap {
        position: relative;
        z-index: 1;
        display: inline-flex;
        width: max-content;
      }

      .scrolling-image {
        display: inline-block;
        animation: 20s linear infinite left-scrolling-images;
      }

      .scrolling-slider-img {
        width: 400px;
        height: 450px;
        object-fit: cover;
        border-radius: 24px;
        box-shadow: 0 18px 32px rgba(0, 0, 0, 0.22);
      }

      .scrolling-slider-img.logo-slide {
        object-fit: contain;
        padding: 26px;
        background: rgba(255, 255, 255, 0.12);
      }

      .multicolor-wave-top,
      .multicolor-wave-bottom {
        pointer-events: none;
        position: absolute;
        left: 0;
        width: 100%;
        height: 100%;
        background-repeat: repeat-x;
        z-index: 2;
      }

      .multicolor-wave-top {
        top: -40px;
        background-image:
          radial-gradient(circle at 40px 40px, #f7c45b 0 32px, transparent 33px),
          radial-gradient(circle at 140px 40px, #f78db1 0 32px, transparent 33px),
          radial-gradient(circle at 240px 40px, #66d7c1 0 32px, transparent 33px),
          radial-gradient(circle at 340px 40px, #fff 0 32px, transparent 33px);
        background-size: 400px 80px;
        background-position: top left;
      }

      .multicolor-wave-bottom {
        bottom: -40px;
        background-image:
          radial-gradient(circle at 40px 40px, #66d7c1 0 32px, transparent 33px),
          radial-gradient(circle at 140px 40px, #fff 0 32px, transparent 33px),
          radial-gradient(circle at 240px 40px, #f7c45b 0 32px, transparent 33px),
          radial-gradient(circle at 340px 40px, #f78db1 0 32px, transparent 33px);
        background-size: 400px 80px;
        background-position: bottom left;
      }

      @media (max-width: 900px) {
        .topbar {
          position: static;
          padding: 20px;
          flex-direction: column;
          align-items: center;
        }

        .brand img {
          width: min(260px, 70vw);
        }

        .nav {
          justify-content: center;
        }

        .hero {
          min-height: auto;
          padding: 12px 16px 40px;
        }

        .scroll-section {
          padding: 44px 0;
        }

        .scrolling-slider-img {
          width: 260px;
          height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="#" aria-label="Scruffy Butts home">
          <img src="./ED2439E1-3724-488C-A24A-03576958CFCE.png" alt="Scruffy Butts logo" />
        </a>
        <nav class="nav" aria-label="Primary">

      <main>

        <section class="gallery-section">

                <div class="scrolling-image">

                </div>
                <div class="scrolling-image">

                </div>
                <div class="scrolling-image">
                  <img src="./ED2439E1-3724-488C-A24A-03576958CFCE.png" class="scrolling-slider-img logo-slide" alt="Dog grooming gallery image 8" />
                </div>
                <div class="scrolling-image">
                  <img src="./F0C1AF65-93DD-4ABD-9872-C30A4376236D.png" class="scrolling-slider-img" alt="Dog grooming gallery image 9" />
                </div>

                  <img src="./F0C1AF65-93DD-4ABD-9872-C30A4376236D.png" class="scrolling-slider-img" alt="Dog grooming gallery image 1 duplicate" />

                </div>
                <div class="scrolling-image">
                  <img src="./ED2439E1-3724-488C-A24A-03576958CFCE.png" class="scrolling-slider-img logo-slide" alt="Dog grooming gallery image 4 duplicate" />
                </div>
                <div class="scrolling-image">
                  <img src="./F0C1AF65-93DD-4ABD-9872-C30A4376236D.png" class="scrolling-slider-img" alt="Dog grooming gallery image 5 duplicate" />
                </div>
                <div class="scrolling-image">
                  <img src="./ED2439E1-3724-488C-A24A-03576958CFCE.png" class="scrolling-slider-img logo-slide" alt="Dog grooming gallery image 6 duplicate" />
                </div>
                <div class="scrolling-image">
                  <img src="./F0C1AF65-93DD-4ABD-9872-C30A4376236D.png" class="scrolling-slider-img" alt="Dog grooming gallery image 7 duplicate" />
                </div>
                <div class="scrolling-image">
                  <img src="./ED2439E1-3724-488C-A24A-03576958CFCE.png" class="scrolling-slider-img logo-slide" alt="Dog grooming gallery image 8 duplicate" />
                </div>
                <div class="scrolling-image">
                  <img src="./F0C1AF65-93DD-4ABD-9872-C30A4376236D.png" class="scrolling-slider-img" alt="Dog grooming gallery image 9 duplicate" />
                </div>
              </div>
              <div class="multicolor-wave-bottom"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
