<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scruffy Butts</title>
    <style>
      :root {
        --vanilla: #fff;
        --pink: #e1accf;
        --purple: #8f4899;
        --midnight: #313131;
        --button-bg: rgba(255, 255, 255, 0.92);
        --button-text: #5f2d67;
        --button-cta: #f7c45b;
        --scroll-duration: 28s;
      }

      * {
        box-sizing: border-box;
      }

      @keyframes scroll-gallery {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-50%, 0, 0);
        }
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-weight: 400;
        font-size: 16px;
        font-style: normal;
        background: linear-gradient(180deg, #9d58aa 0%, #8f4899 55%, #73397d 100%);
        color: var(--vanilla);
      }

      img {
        display: block;
        max-width: 100%;
      }

      .page {
        position: relative;
        min-height: 100vh;
      }

      .topbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
        padding: 24px 32px;
        z-index: 3;
      }

      .brand {
        display: inline-flex;
        align-items: flex-start;
        flex-shrink: 0;
      }

      .brand img {
        width: clamp(180px, 28vw, 300px);
        min-width: 150px;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.2));
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 14px;
      }

      .nav button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 24px;
        border: 0;
        border-radius: 999px;
        background: var(--button-bg);
        color: var(--button-text);
        font: inherit;
        font-size: 1rem;
        letter-spacing: 0.02em;
        cursor: pointer;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
      }

      .nav button:last-child {
        background: var(--button-cta);
        color: var(--midnight);
      }

      .hero {
        min-height: 100vh;
        padding: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .hero-frame {
        width: 100%;
        overflow: hidden;
      }

      .hero-frame img {
        width: 100%;
        height: 100vh;
        object-fit: cover;
        object-position: center;
      }

      .gallery-section {
        margin-top: 0;
        padding: 0 0 72px;
      }

      .container-fluid {
        padding: 0;
      }

      .scroll-section {
        position: relative;
        overflow: hidden;
        padding: 64px 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      }

      .scrolling-images-wrap {
        position: relative;
        z-index: 1;
        display: inline-flex;
        width: max-content;
        animation: var(--scroll-duration) linear infinite scroll-gallery;
        will-change: transform;
      }

      .scrolling-image {
        display: inline-block;
      }

      .scrolling-slider-img {
        width: 400px;
        height: 400px;
        object-fit: cover;
        border-radius: 24px;
        box-shadow: 0 18px 32px rgba(0, 0, 0, 0.22);
      }

      .scrolling-slider-img.logo-slide {
        object-fit: contain;
        padding: 26px;
        background: rgba(255, 255, 255, 0.12);
      }

      .multicolor-wave-top,
      .multicolor-wave-bottom {
        pointer-events: none;
        position: absolute;
        left: 0;
        width: 100%;
        height: 100%;
        background-repeat: repeat-x;
        z-index: 2;
      }

      .multicolor-wave-top {
        top: -40px;
        background-image:
          radial-gradient(circle at 40px 40px, #f7c45b 0 32px, transparent 33px),
          radial-gradient(circle at 140px 40px, #f78db1 0 32px, transparent 33px),
          radial-gradient(circle at 240px 40px, #66d7c1 0 32px, transparent 33px),
          radial-gradient(circle at 340px 40px, #fff 0 32px, transparent 33px);
        background-size: 400px 80px;
        background-position: top left;
      }

      .multicolor-wave-bottom {
        bottom: -40px;
        background-image:
          radial-gradient(circle at 40px 40px, #66d7c1 0 32px, transparent 33px),
          radial-gradient(circle at 140px 40px, #fff 0 32px, transparent 33px),
          radial-gradient(circle at 240px 40px, #f7c45b 0 32px, transparent 33px),
          radial-gradient(circle at 340px 40px, #f78db1 0 32px, transparent 33px);
        background-size: 400px 80px;
        background-position: bottom left;
      }

      @media (max-width: 900px) {
        .topbar {
          gap: 16px;
          padding: 16px;
        }

        .brand img {
          width: min(210px, 52vw);
        }

        .nav {
          max-width: calc(100% - 32px);
          gap: 10px;
        }

        .nav button {
          padding: 12px 18px;
          font-size: 0.95rem;
        }

        .hero {
          min-height: 100vh;
        }

        .scroll-section {
          padding: 44px 0;
        }

        .scrolling-slider-img {
          width: 260px;
          height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="#" aria-label="Scruffy Butts home">
          <img src="./ED2439E1-3724-488C-A24A-03576958CFCE.png" alt="Scruffy Butts logo" />
        </a>
        <nav class="nav" aria-label="Primary">
          <button type="button">About Us</button>
          <button type="button">Contact</button>
          <button type="button">Book Appointment</button>
        </nav>
      </header>

      <main>
        <section class="hero" aria-label="Hero image">
          <div class="hero-frame">
            <img src="./F0C1AF65-93DD-4ABD-9872-C30A4376236D.png" alt="Scruffy Butts hero image" />
          </div>
        </section>

        <section class="gallery-section">
          <div class="container-fluid">
            <div class="scroll-section">
              <div class="multicolor-wave-top"></div>
              <div class="scrolling-images-wrap" aria-hidden="true">
                <div class="scrolling-image">
                  <img src="./IMG_5006.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5007.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5008.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5345.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5346.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5744.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5006.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5007.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5008.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5345.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5346.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5744.png" class="scrolling-slider-img" alt="" />
                </div>
              </div>
              <div class="multicolor-wave-bottom"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
