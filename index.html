<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scruffy Butts</title>
    <style>
      :root {
        --vanilla: #fff;
        --pink: #e1accf;
        --purple: #8f4899;
        --midnight: #313131;
        --button-bg: rgba(255, 255, 255, 0.92);
        --button-text: #5f2d67;
        --button-cta: #f7c45b;
        --scroll-duration: 28s;
      }

      * {
        box-sizing: border-box;
      }

      @keyframes scroll-gallery {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-50%, 0, 0);
        }
      }

      @keyframes hero-title-float {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(1);
          text-shadow:
            0 3px 0 rgba(95, 45, 103, 0.95),
            0 10px 20px rgba(49, 49, 49, 0.28),
            0 18px 40px rgba(49, 49, 49, 0.24);
        }
        50% {
          transform: translate3d(0, -6px, 0) scale(1.01);
          text-shadow:
            0 5px 0 rgba(95, 45, 103, 0.95),
            0 14px 28px rgba(49, 49, 49, 0.34),
            0 22px 44px rgba(49, 49, 49, 0.28);
        }
      }

      @keyframes hero-subtitle-glow {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
          text-shadow:
            0 2px 0 rgba(95, 45, 103, 0.72),
            0 8px 22px rgba(49, 49, 49, 0.25);
        }
        50% {
          transform: translate3d(0, -3px, 0);
          text-shadow:
            0 3px 0 rgba(95, 45, 103, 0.8),
            0 12px 26px rgba(49, 49, 49, 0.3);
        }
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        font-weight: 400;
        font-size: 16px;
        font-style: normal;
        background: linear-gradient(180deg, #9d58aa 0%, #8f4899 55%, #73397d 100%);
        color: var(--vanilla);
      }

      img {
        display: block;
        max-width: 100%;
      }

      .page {
        position: relative;
        min-height: 100vh;
      }

      .topbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        padding: 24px 32px;
        z-index: 3;
      }

      .brand {
        display: inline-flex;
        align-items: flex-start;
        flex-shrink: 0;
      }

      .brand img {
        width: clamp(180px, 28vw, 300px);
        min-width: 150px;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.2));
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 14px;
      }

      .nav button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 24px;
        border: 0;
        border-radius: 999px;
        background: var(--button-bg);
        color: var(--button-text);
        font: inherit;
        font-size: 1rem;
        letter-spacing: 0.02em;
        cursor: pointer;
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
      }

      .nav button:last-child {
        background: var(--button-cta);
        color: var(--midnight);
      }

      .hero {
        position: relative;
        min-height: 100vh;
        padding: 0;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }

      .hero-frame {
        width: 100%;
        overflow: hidden;
      }

      .hero-content {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        gap: 14px;
        padding: 140px 40px 56px;
      }

      .hero-title,
      .hero-subtitle {
        margin: 0;
        max-width: min(760px, 100%);
      }

      .hero-title {
        font-size: clamp(2.6rem, 6.6vw, 5.35rem);
        font-weight: 700;
        line-height: 1.04;
        letter-spacing: 0.01em;
        color: var(--button-cta);
        animation: hero-title-float 6s ease-in-out infinite;
        will-change: transform;
        text-shadow:
          0 3px 0 rgba(95, 45, 103, 0.95),
          0 10px 20px rgba(49, 49, 49, 0.28),
          0 18px 40px rgba(49, 49, 49, 0.24);
      }

      .hero-title-group {
        white-space: nowrap;
      }

      .hero-subtitle {
        font-size: clamp(1.2rem, 2.6vw, 1.75rem);
        line-height: 1.32;
        max-width: 34ch;
        font-weight: 600;
        color: #ffeaf6;
        animation: hero-subtitle-glow 5s ease-in-out infinite;
        will-change: transform;
        text-shadow:
          0 2px 0 rgba(95, 45, 103, 0.72),
          0 8px 22px rgba(49, 49, 49, 0.25);
      }

      @supports ((-webkit-background-clip: text) or (background-clip: text)) {
        .hero-title {
          background: linear-gradient(135deg, #fff7c9 0%, var(--button-cta) 28%, var(--pink) 58%, #c98ed3 100%);
          -webkit-background-clip: text;
          background-clip: text;
          -webkit-text-fill-color: transparent;
        }
      }

      .hero-frame img {
        width: 100%;
        height: 100vh;
        object-fit: cover;
        object-position: center;
      }

      .gallery-section {
        margin-top: 0;
        padding: 0 0 72px;
      }

      .container-fluid {
        padding: 0;
      }

      .scroll-section {
        position: relative;
        overflow: hidden;
        padding: 64px 0;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      }

      .scrolling-images-wrap {
        position: relative;
        z-index: 1;
        display: inline-flex;
        width: max-content;
        animation: var(--scroll-duration) linear infinite scroll-gallery;
        will-change: transform;
      }

      .scrolling-image {
        display: inline-block;
      }

      .scrolling-slider-img {
        width: 400px;
        height: 400px;
        object-fit: cover;
        border-radius: 24px;
        box-shadow: 0 18px 32px rgba(0, 0, 0, 0.22);
      }

      .scrolling-slider-img.logo-slide {
        object-fit: contain;
        padding: 26px;
        background: rgba(255, 255, 255, 0.12);
      }

      .multicolor-wave-top,
      .multicolor-wave-bottom {
        pointer-events: none;
        position: absolute;
        left: 0;
        width: 100%;
        height: 100%;
        background-repeat: repeat-x;
        z-index: 2;
      }

      .multicolor-wave-top {
        top: -40px;
        background-image:
          radial-gradient(circle at 40px 40px, #f7c45b 0 32px, transparent 33px),
          radial-gradient(circle at 140px 40px, #f78db1 0 32px, transparent 33px),
          radial-gradient(circle at 240px 40px, #66d7c1 0 32px, transparent 33px),
          radial-gradient(circle at 340px 40px, #fff 0 32px, transparent 33px);
        background-size: 400px 80px;
        background-position: top left;
      }

      .multicolor-wave-bottom {
        bottom: -40px;
        background-image:
          radial-gradient(circle at 40px 40px, #66d7c1 0 32px, transparent 33px),
          radial-gradient(circle at 140px 40px, #fff 0 32px, transparent 33px),
          radial-gradient(circle at 240px 40px, #f7c45b 0 32px, transparent 33px),
          radial-gradient(circle at 340px 40px, #f78db1 0 32px, transparent 33px);
        background-size: 400px 80px;
        background-position: bottom left;
      }

      @media (max-width: 900px) {
        .topbar {
          gap: 16px;
          padding: 16px;
        }

        .brand img {
          width: min(210px, 52vw);
        }

        .nav {
          max-width: calc(100% - 32px);
          gap: 10px;
        }

        .nav button {
          padding: 12px 18px;
          font-size: 0.95rem;
        }

        .hero {
          min-height: 100vh;
        }

        .hero-content {
          gap: 12px;
          padding: 124px 20px 44px;
        }

        .hero-title {
          font-size: clamp(2rem, 9vw, 3.8rem);
        }

        .hero-subtitle {
          font-size: clamp(1.1rem, 4.8vw, 1.45rem);
        }

        .scroll-section {
          padding: 44px 0;
        }

        .scrolling-slider-img {
          width: 260px;
          height: 260px;
        }
      }

      @media (orientation: portrait) {
        .hero-content {
          justify-content: flex-end;
          padding-top: 160px;
          padding-bottom: 72px;
        }
      }

      @media (orientation: landscape) and (max-height: 700px) {
        .hero-content {
          justify-content: flex-end;
          padding-top: 112px;
          padding-bottom: 40px;
        }

        .hero-title {
          font-size: clamp(1.95rem, 5vw, 3.45rem);
        }

        .hero-subtitle {
          font-size: clamp(1rem, 2vw, 1.25rem);
        }
      }

      @media (max-width: 380px) {
        .hero-title {
          font-size: clamp(1.45rem, 9.5vw, 2rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero-title,
        .hero-subtitle {
          animation: none;
          transform: none;
          will-change: auto;
        }
      }

      @media (forced-colors: active) {
        .hero-title,
        .hero-subtitle {
          color: CanvasText;
          text-shadow: none;
          background: none;
          -webkit-text-fill-color: currentColor;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="#" aria-label="Scruffy Butts home">
          <img src="./IMG_5769.png" alt="Scruffy Butts logo" />
        </a>
        <nav class="nav" aria-label="Primary">
          <button type="button">About Us</button>
          <button type="button">Contact</button>
          <button type="button">Book Appointment</button>
        </nav>
      </header>

      <main>
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-frame">
            <img src="./F0C1AF65-93DD-4ABD-9872-C30A4376236D.png" alt="Freshly groomed dog" />
          </div>
          <div class="hero-content">
            <h1 class="hero-title" id="hero-title"><span class="hero-title-group">Refined Grooming.</span> Real Results.</h1>
            <p class="hero-subtitle">The Standard Your Dog's Been Missing</p>
          </div>
        </section>

        <section class="gallery-section">
          <div class="container-fluid">
            <div class="scroll-section">
              <div class="multicolor-wave-top"></div>
              <div class="scrolling-images-wrap" aria-hidden="true">
                <div class="scrolling-image">
                  <img src="./IMG_5006.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5007.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5008.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5345.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5346.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image">
                  <img src="./IMG_5744.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5006.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5007.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5008.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5345.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5346.png" class="scrolling-slider-img" alt="" />
                </div>
                <div class="scrolling-image" aria-hidden="true">
                  <img src="./IMG_5744.png" class="scrolling-slider-img" alt="" />
                </div>
              </div>
              <div class="multicolor-wave-bottom"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
